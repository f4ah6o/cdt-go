name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...
      - run: go run ./cmd/cdt graph docs -o .cdt/graph.json
      - run: go run ./cmd/cdt check --strict
      - run: go run ./cmd/cdt coverage
      - run: go run ./cmd/cdt test
      - run: go run ./cmd/cdt render docs -o .cdt/generated-docs
      - run: test -s .cdt/generated-docs/cdt.generated.md
      - uses: actions/upload-artifact@v4
        with:
          name: cdt-generated-docs
          path: .cdt/generated-docs/cdt.generated.md
